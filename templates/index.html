<!DOCTYPE html>
<html>
<head>
    <title>MoveNet Pose Detection</title>
    <style>
        body {
            background: #171414;
            color: rgb(233, 224, 224);
            text-align: center;
            font-family: Arial, sans-serif;
            margin: 0;
        }
        h1 {
            margin-top: 20px;
        }
        .controls {
            margin-top: 15px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 10px;
            cursor: pointer;
            border-radius: 6px;
            border: none;
        }
        #startBtn {
            background-color: #00c853;
            color: white;
        }
        #stopBtn {
            background-color: #d50000;
            color: white;
        }
        .camera-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 30px;
        }

        #container {
            position: relative;
            width: 720px;   
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            border-radius: 12px;
        }
    </style>
</head>
<body>
<h1>MoveNet Pose Detection</h1>
<div class="controls">
    <button id="startBtn" onclick="startCamera()">OK - Start Recording</button>
    <button id="stopBtn" onclick="stopCamera()">Stop (or press Q)</button>
</div>
<div class="camera-wrapper">
    <div id="container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
    </div>
</div>
<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let stream = null;
let running = false;
let animationId = null;
const EDGES = [
    [0,1],[0,2],[1,3],[2,4],
    [0,5],[0,6],[5,7],[7,9],
    [6,8],[8,10],[5,6],
    [5,11],[6,12],[11,12],
    [11,13],[13,15],[12,14],[14,16]
];
async function startCamera() {
    if (running) return;
    stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
    };
    running = true;
    processFrame();
}
function stopCamera() {
    running = false;
    if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
    }
    if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
    }
    video.srcObject = null;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}
document.addEventListener("keydown", function(event) {
    if (event.key === "q") stopCamera();
});
async function processFrame() {
    if (!running) return;
    let tempCanvas = document.createElement("canvas");
    tempCanvas.width = video.videoWidth;
    tempCanvas.height = video.videoHeight;
    let tempCtx = tempCanvas.getContext("2d");
    tempCtx.drawImage(video, 0, 0);
    let blob = await new Promise(resolve => tempCanvas.toBlob(resolve, "image/jpeg"));
    let formData = new FormData();
    formData.append("file", blob);
    try {
        let response = await fetch("/predict", {
            method: "POST",
            body: formData
        });
        let data = await response.json();
        drawPose(data.keypoints);
    } catch (error) {
        console.error("Error:", error);
    }
    animationId = requestAnimationFrame(processFrame);
}
function drawPose(keypoints) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let points = keypoints[0][0];
    for (let i = 0; i < points.length; i++) {
        let y = points[i][0];
        let x = points[i][1];
        let confidence = points[i][2];
        if (confidence > 0.4) {
            let realX = x * canvas.width;
            let realY = y * canvas.height;
            ctx.beginPath();
            ctx.arc(realX, realY, 5, 0, 2 * Math.PI);
            ctx.fillStyle = "lime";
            ctx.fill();
        }
    }
    ctx.strokeStyle = "yellow";
    ctx.lineWidth = 2;
    EDGES.forEach(edge => {
        let p1 = points[edge[0]];
        let p2 = points[edge[1]];
        if (p1[2] > 0.4 && p2[2] > 0.4) {
            ctx.beginPath();
            ctx.moveTo(p1[1] * canvas.width, p1[0] * canvas.height);
            ctx.lineTo(p2[1] * canvas.width, p2[0] * canvas.height);
            ctx.stroke();
        }
    });
}
</script>
</body>
</html>
